x-backend-build: &backend-build
  context: ..
  dockerfile: docker/Dockerfile
  target: runtime

x-backend-env: &backend-env
  FLASK_ENV: production
  DATABASE_URL: postgresql://mamina:mamina_password@db:5432/churn_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  MODEL_PATH: /app/models/churn_model.pkl
  TOPIC_MODEL_PATH: /app/models/topic_model
  NLP_STRICT: "true"
  HF_HOME: /app/.cache/huggingface
  TRANSFORMERS_CACHE: /app/.cache/huggingface/transformers
  SENTENCE_TRANSFORMERS_HOME: /app/.cache/huggingface/sentence_transformers

services:
  # Flask API
  api:
    build: *backend-build
    container_name: mamina-api
    ports:
      - "5000:5000"
    environment:
      <<: *backend-env
      FLASK_APP: app:create_app
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-here}
      MODEL_VERSION: v1.0.0
      ENABLE_SHAP: "true"
    volumes:
      - ../models:/app/models:ro
      - ../logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mamina-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  celery-worker:
    build: *backend-build
    container_name: mamina-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment: *backend-env
    volumes:
      - ../models:/app/models
      - ../logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mamina-network

  # Celery Beat (Scheduler)
  celery-beat:
    build: *backend-build
    container_name: mamina-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment: *backend-env
    volumes:
      - ../logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      - celery-worker
    restart: unless-stopped
    networks:
      - mamina-network

  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg17
    container_name: mamina-db
    environment:
      - POSTGRES_USER=mamina
      - POSTGRES_PASSWORD=mamina_password
      - POSTGRES_DB=churn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - mamina-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mamina -d churn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: mamina-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mamina-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: mamina-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mamina-network
    profiles:
      - production

networks:
  mamina-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  hf_cache:
