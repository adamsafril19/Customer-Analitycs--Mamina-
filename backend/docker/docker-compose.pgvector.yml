version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mamina_postgres_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maminaChurn_db
    ports:
      - "5434:5432"  # Using 5434 to avoid conflict with local PostgreSQL
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
